name: ci
on: [push]
jobs:
  tests:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@eef61447b9ff4aafe5dcd4e0bbf5d482be7e7871 # v4
        with:
          submodules: recursive
      - name: Install npm dependencies
        run: npm install
      - name: linter readme.md
        run: npm run lint:markdown